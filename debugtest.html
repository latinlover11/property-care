<!DOCTYPE html>
<html>
<head>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f5f0e8; padding: 2rem; font-family: sans-serif; }

.portfolio-img-wrap { position: relative; display: inline-block; }

.portfolio-comparison { user-select: none; border-radius: 2px; overflow: hidden; }

.comparison-slider {
  position: relative; width: 400px; height: 300px;
  overflow: hidden; cursor: ew-resize;
}
.comparison-img { position: absolute; inset: 0; }
.comparison-img img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  user-select: none; -webkit-user-drag: none; pointer-events: none;
}
.comparison-img-after { clip-path: inset(0 0 0 50%); }
.comparison-slider-handle {
  position: absolute; top: 0; bottom: 0; left: 50%;
  width: 40px; z-index: 10; pointer-events: none;
  display: flex; align-items: center; justify-content: center;
}
.comparison-divider {
  width: 2px; height: 100%; background: #C4977A;
  display: flex; align-items: center; justify-content: center;
}
.comparison-knob {
  width: 36px; height: 36px; background: #C4977A; color: white;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem; font-weight: 700;
}

.expand-btn {
  position: absolute; bottom: 8px; right: 8px;
  z-index: 999;
  background: rgba(61,43,31,0.8); color: white;
  border: 2px solid white; border-radius: 4px;
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 1rem;
}

/* LIGHTBOX */
#lightbox {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.92); z-index: 10000;
  flex-direction: column; align-items: center; justify-content: center; gap: 1rem;
}
#lightbox img { max-width: 90vw; max-height: 80vh; object-fit: contain; }
.lb-controls { display: flex; gap: 1rem; }
.lb-controls button {
  padding: 0.5rem 1.5rem; cursor: pointer; border: none;
  background: #C4977A; color: white; font-size: 1rem; border-radius: 4px;
}
#lbClose {
  position: absolute; top: 1rem; right: 1.5rem;
  background: none; border: none; color: white;
  font-size: 2rem; cursor: pointer;
}
</style>
</head>
<body>

<div class="portfolio-img-wrap">
  <div class="portfolio-comparison">
    <div class="comparison-slider" id="slider1">
      <div class="comparison-img comparison-img-before">
        <img src="stairsbefore.jpg" alt="before">
      </div>
      <div class="comparison-img comparison-img-after">
        <img src="stairsafter.jpg" alt="after">
      </div>
      <div class="comparison-slider-handle">
        <div class="comparison-divider"><div class="comparison-knob">‹ ›</div></div>
      </div>
    </div>
  </div>
  <button class="expand-btn" data-before="stairsbefore.jpg" data-after="stairsafter.jpg">⤢</button>
</div>

<div id="lightbox">
  <button id="lbClose">&times;</button>
  <div class="lb-controls">
    <button id="lbBefore">Before</button>
    <button id="lbAfter">After</button>
  </div>
  <img id="lbImg" src="" alt="">
</div>

<script>
let activeComparison = null;

document.querySelectorAll('.comparison-slider').forEach(slider => {
  const after = slider.querySelector('.comparison-img-after');
  const handle = slider.querySelector('.comparison-slider-handle');
  after.style.clipPath = 'inset(0 0 0 50%)';
  handle.style.left = '50%';

  slider.addEventListener('pointerdown', (e) => {
    if (e.target.closest('.expand-btn')) return;
    activeComparison = slider;
    const rect = slider.getBoundingClientRect();
    let pct = ((e.clientX - rect.left) / rect.width) * 100;
    pct = Math.max(0, Math.min(100, pct));
    after.style.clipPath = `inset(0 0 0 ${pct}%)`;
    handle.style.left = pct + '%';
    slider.setPointerCapture(e.pointerId);
  });

  slider.addEventListener('pointermove', (e) => {
    if (activeComparison !== slider) return;
    const rect = slider.getBoundingClientRect();
    let pct = ((e.clientX - rect.left) / rect.width) * 100;
    pct = Math.max(0, Math.min(100, pct));
    after.style.clipPath = `inset(0 0 0 ${pct}%)`;
    handle.style.left = pct + '%';
  });

  slider.addEventListener('pointerup', () => { activeComparison = null; });
});

// Expand buttons
let curBefore = '', curAfter = '';
const lightbox = document.getElementById('lightbox');
const lbImg = document.getElementById('lbImg');

document.querySelectorAll('.expand-btn').forEach(btn => {
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    curBefore = btn.dataset.before;
    curAfter = btn.dataset.after;
    lbImg.src = curAfter;
    lightbox.style.display = 'flex';
  });
});

document.getElementById('lbBefore').addEventListener('click', () => { lbImg.src = curBefore; });
document.getElementById('lbAfter').addEventListener('click', () => { lbImg.src = curAfter; });
document.getElementById('lbClose').addEventListener('click', () => { lightbox.style.display = 'none'; });
lightbox.addEventListener('click', (e) => { if (e.target === lightbox) lightbox.style.display = 'none'; });
</script>
</body>
</html>
